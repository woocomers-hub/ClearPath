<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClearPath — Emergency Financial Help</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
    }
    .badge {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px; padding: 6px 16px; font-size: 13px; color: #aaa; margin-bottom: 32px;
    }
    h1 {
      font-size: clamp(32px, 7vw, 56px); font-weight: 800; text-align: center;
      line-height: 1.15; letter-spacing: -1.5px; max-width: 640px; margin-bottom: 20px;
    }
    h1 span {
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 18px; color: #888; text-align: center; max-width: 480px; line-height: 1.6; margin-bottom: 40px;
    }
    .btn {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: white; border: none; padding: 18px 40px; font-size: 17px; font-weight: 700;
      border-radius: 14px; cursor: pointer; transition: 0.15s;
      box-shadow: 0 8px 32px rgba(59,130,246,0.35);
    }
    .footer { position: absolute; bottom: 24px; font-size: 13px; color: #444; }
  </style>
</head>
<body>
  <div class="badge">🇺🇸 Serving Americans in financial crisis</div>
  <h1>Find emergency financial help <span>in 60 seconds.</span></h1>
  <p class="subtitle">Before you take a payday loan, let us show you a better option — free, fast, and specific to your situation.</p>
  <button class="btn" onclick="alert('Starting the AI chat...')">Get Help Now — It's Free</button>
  <div class="footer">ClearPath — Built to protect people, not profit from them.</div>
</body>
</html>
