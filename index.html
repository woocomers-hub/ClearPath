<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearPath AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-out { opacity: 0; transition: opacity 0.5s ease; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black text-white">
    <div id="landing" class="flex flex-col items-center justify-center h-screen text-center p-6 transition-all duration-700">
        <h1 class="text-6xl font-bold mb-6 tracking-tight">ClearPath</h1>
        <p class="text-zinc-400 text-lg mb-10 max-w-md">Professional financial emergency guidance for US residents.</p>
        <button onclick="startApp()" class="bg-white text-black px-12 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform active:scale-95">
            Get Started
        </button>
    </div>

    <div id="chat-section" class="hidden h-screen flex flex-col max-w-2xl mx-auto p-4 fade-in">
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-6 py-10">
            <div class="text-zinc-500 text-sm">System: Connected to ClearPath AI.</div>
        </div>
        <div class="p-4 border-t border-zinc-800">
            <div class="flex gap-4">
                <input id="user-input" type="text" placeholder="Explain your situation..." class="flex-1 bg-transparent border-none text-xl focus:outline-none">
                <button onclick="send()" class="text-white font-bold text-lg">Send</button>
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            document.getElementById('landing').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('landing').classList.add('hidden');
                document.getElementById('chat-section').classList.remove('hidden');
            }, 500);
        }

        async function send() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value) return;

            const message = input.value;
            chatBox.innerHTML += <div class="text-right text-2xl font-medium">${message}</div>;
            input.value = '';

            const loading = document.createElement('div');
            loading.className = "text-zinc-600 animate-pulse";
            loading.innerText = "Analyzing...";
            chatBox.appendChild(loading);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                loading.remove();
                chatBox.innerHTML += <div class="text-blue-500 text-2xl font-medium leading-relaxed">${data.reply}</div>;
            } catch (e) {
                loading.innerText = "Connection error. Check Vercel API settings.";
            }
        }
    </script>
</body>
</html>
