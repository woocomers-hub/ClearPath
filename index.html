<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearPath AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col">
    <div id="chat-container" class="max-w-2xl mx-auto w-full flex-1 flex flex-col p-4">
        <h1 class="text-3xl font-black text-blue-500 mb-6 text-center tracking-tighter">ClearPath AI</h1>
        
        <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4 p-4 border border-zinc-800 rounded-2xl bg-zinc-950/50">
            <div class="bg-blue-900/20 border border-blue-900/30 p-4 rounded-2xl text-blue-100 max-w-[85%]">
                Hello! I am your financial assistant. Tell me about your situation, and I'll help you find safe alternatives to payday loans.
            </div>
        </div>

        <div class="flex gap-2 bg-black p-2 sticky bottom-0">
            <input id="user-input" type="text" placeholder="Explain your situation..." class="flex-1 bg-zinc-900 border border-zinc-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white">
            <button onclick="send()" class="bg-blue-600 px-6 py-4 rounded-xl font-bold hover:bg-blue-500 transition-all">Send</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('user-input');
            const msgDiv = document.getElementById('messages');
            const message = input.value.trim();
            if(!message) return;

            // User Message
            msgDiv.innerHTML += <div class="bg-zinc-800 p-4 rounded-2xl text-white ml-auto max-w-[85%]">${message}</div>;
            input.value = '';
            msgDiv.scrollTop = msgDiv.scrollHeight;

            // Loading
            const loadingId = 'loading-' + Date.now();
            msgDiv.innerHTML += <div id="${loadingId}" class="text-zinc-500 text-sm animate-pulse ml-2">ClearPath is thinking...</div>;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: message })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();
                
                // AI Response
                msgDiv.innerHTML += <div class="bg-blue-900/20 border border-blue-900/30 p-4 rounded-2xl text-blue-100 max-w-[85%]">${data.reply}</div>;
                msgDiv.scrollTop = msgDiv.scrollHeight;
            } catch (e) {
                document.getElementById(loadingId).innerText = "Connection error. Please check your Vercel settings.";
            }
        }
    </script>
</body>
</html>
